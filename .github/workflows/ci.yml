name: ci

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify extension entry point
        run: node --check src/extension.js

      - name: Publish SharpDbg payload
        run: node scripts/publish-sharpdbg.js

      - name: Show published payload
        run: ls -la dist/sharpdbg
